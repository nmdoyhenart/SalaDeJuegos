<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card gamer-card shadow-lg">
                <div class="card-header custom-card-header text-center">
                    <h4 class="mb-0 fw-bold">Iniciar Sesión</h4>
                </div>
                <div class="card-body p-4">
                    
                    <form>
                        <div class="mb-3">
                            <label class="form-label text-accent">Correo Electrónico</label>
                            <input type="email" class="form-control custom-input" placeholder="ejemplo@correo.com">
                        </div>

                        <div class="mb-4">
                            <label class="form-label text-accent">Contraseña</label>
                            <div class="position-relative">
                                <input type="password" class="form-control custom-input pr-5" placeholder="Tu contraseña">
                            </div>
                        </div>

                        <button type="button" class="btn btn-neon-red w-100 rounded-pill py-2 fw-bold" (click)="abrirModal()">
                            INICIAR SESIÓN
                        </button>
                    </form>

                    <div class="mt-4 pt-2 border-top border-secondary border-opacity-25">
                        <p class="text-center text-light opacity-50 mb-2" style="font-size: 0.8rem;">Acceso Rápido (En desarrollo)</p>
                        <div class="d-flex justify-content-center gap-2">
                            <button type="button" class="btn-prueba btn-test-1">Usuario 1</button>
                            <button type="button" class="btn-prueba btn-test-2">Usuario 2</button>
                            <button type="button" class="btn-prueba btn-test-3">Usuario 3</button>
                        </div>
                    </div>

                    <div class="text-center mt-4">
                        <p class="text-light opacity-75">¿No tienes cuenta? <a routerLink="/registro" class="text-info text-decoration-none fw-bold">Regístrate aquí</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    @if (mostrarModal()) {
        <div class="modal d-block" tabindex="-1" style="background-color: rgba(0, 0, 0, 0.9); backdrop-filter: blur(8px);">
        <div class="modal-dialog modal-dialog-centered">
            
            <div class="modal-content gamer-card shadow-lg" style="border: 1px solid #ffac00; background-color: #121212;">
            
            <div class="modal-header border-0">
                <button type="button" class="btn-close btn-close-white" (click)="cerrarModal()"></button>
            </div>
            
            <div class="modal-body text-center p-4">
                <div class="mb-3" style="font-size: 3.5rem;">⚠️</div>
                <h4 class="text-white mb-3">Módulo Offline</h4>
                <p class="text-light opacity-75 mb-0">La validación de credenciales y la persistencia de las mismas están programados en el <strong>Sprint 2</strong>.</p>
                <div class="p-2 mt-3 rounded" style="background-color: rgba(255, 172, 0, 0.1); border: 1px dashed #ffac00;">
                    <code style="color: #ffac00;">Status: Pending_Develoment_Action</code>
                </div>
            </div>
            
            <div class="modal-footer border-0 justify-content-center pb-4 flex-column gap-2">
                <button type="button" class="btn btn-outline-warning w-75 rounded-pill fw-bold" (click)="navegarAlHome()">
                    VOLVER AL HOME
                </button>
            </div>
            </div>
        </div>
        </div>
    }
</div>
